spring:
  application:
    name: apigateway
  cloud:
    gateway:
      server:
        webflux:
          # Auto-create a route for every service registered in Eureka
          # (e.g. /EMPLOYEESERVICE/**) - handy fallback.
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          # Explicit, clean routes: client never talks to a port directly.
          routes:
            - id: employee-service
              uri: lb://EMPLOYEESERVICE
              predicates:
                - Path=/api/employees/**,/api/auth/**
            - id: department-service
              uri: lb://DEPARTMENTSERVICE
              predicates:
                - Path=/api/departments/**

server:
  port: 9000

# The gateway is a Eureka client so it can resolve lb://SERVICE names
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
